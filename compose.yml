services:
  # ── Chat LLM: Nemotron Nano 9B v2 (NVFP4) on the GPU, OpenAI-compatible API ──
  engine:
    image: nvcr.io/nvidia/vllm:25.10-py3
    container_name: engine
    entrypoint: ["vllm", "serve"]
    command: >
      nvidia/NVIDIA-Nemotron-Nano-9B-v2-NVFP4
      --host 0.0.0.0 --port 8000
      --gpu-memory-utilization 0.80
      --max-model-len 32768
      --max-num-seqs 200
      --trust-remote-code
    ports: ["8000:8000"]
    restart: unless-stopped
    ipc: host
    shm_size: "16gb"
    environment:
      HF_HOME: /root/.cache/huggingface
      TOKENIZERS_PARALLELISM: "false"
    volumes:
      - hf-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 80
      start_period: 240s

  # ── Embeddings: BGE-m3 via vLLM pooling mode ────────────────────────────────
  vllm-embedding:
    image: nvcr.io/nvidia/vllm:25.10-py3
    container_name: vllm-embedding
    entrypoint: ["vllm", "serve"]
    command: >
      BAAI/bge-m3
      --host 0.0.0.0 --port 8081
      --runner pooling
      --max-model-len 2000
      --gpu-memory-utilization 0.10
    ports: ["8081:8081"]
    restart: unless-stopped
    ipc: host
    environment:
      HF_HOME: /root/.cache/huggingface
      TOKENIZERS_PARALLELISM: "false"
    volumes:
      - hf-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 60
      start_period: 180s

  # ── Vector store ────────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant
    container_name: qdrant
    ports: ["6333:6333", "6334:6334"]
    restart: unless-stopped
    volumes:
      - qdrant_storage:/qdrant/storage

  # ── Document text extraction ────────────────────────────────────────────────
  tika:
    image: apache/tika:latest-full
    container_name: tika
    ports: ["9998:9998"]
    restart: unless-stopped

  # ── Chat UI + RAG orchestrator ──────────────────────────────────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports: ["3000:8080"]
    restart: unless-stopped
    environment:
      # Chat backend
      OPENAI_API_BASE_URL: http://engine:8000/v1
      OPENAI_API_KEY: "sk-noauth"
      # Vector store
      VECTOR_DB: qdrant
      QDRANT_URI: http://qdrant:6333
      # Embeddings via the external vLLM embedding service
      RAG_EMBEDDING_ENGINE: openai
      RAG_OPENAI_API_BASE_URL: http://vllm-embedding:8081/v1
      RAG_OPENAI_API_KEY: "sk-noauth"
      RAG_EMBEDDING_MODEL: BAAI/bge-m3
      # Document extraction via Tika
      CONTENT_EXTRACTION_ENGINE: tika
      TIKA_SERVER_URL: http://tika:9998
      ENABLE_WEB_LOADER_SSL_VERIFICATION: "false"
    volumes:
      - open-webui-data:/app/backend/data
    depends_on:
      engine:
        condition: service_healthy
      vllm-embedding:
        condition: service_healthy
      qdrant:
        condition: service_started
      tika:
        condition: service_started

volumes:
  hf-cache:
    name: hf-cache
  qdrant_storage:
  open-webui-data:

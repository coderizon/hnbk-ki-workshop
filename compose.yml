services:
  # ── Chat LLM: Nemotron Nano 9B v2 (NVFP4) on the GPU, OpenAI-compatible API ──
  engine:
    image: ${ENGINE_IMAGE}
    container_name: engine
    entrypoint: ["vllm", "serve"]
    command: >
      ${CHAT_MODEL}
      --host 0.0.0.0 --port 8000
      --gpu-memory-utilization ${CHAT_GPU_FRACTION}
      --max-model-len ${MAX_MODEL_LEN}
      --max-num-seqs ${MAX_NUM_SEQS}
      --trust-remote-code
    ports: ["${ENGINE_PORT}:8000"]
    restart: unless-stopped
    ipc: host
    shm_size: "16gb"
    environment:
      HF_HOME: /root/.cache/huggingface
      TOKENIZERS_PARALLELISM: "false"
    volumes:
      - hf-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 80
      start_period: 240s

  # ── Embeddings: BGE-m3 via vLLM pooling mode ────────────────────────────────
  vllm-embedding:
    image: ${EMBEDDING_IMAGE}
    container_name: vllm-embedding
    entrypoint: ["vllm", "serve"]
    command: >
      ${EMBEDDING_MODEL}
      --host 0.0.0.0 --port 8081
      --runner pooling
      --max-model-len 2000
      --gpu-memory-utilization ${EMBED_GPU_FRACTION}
    ports: ["${EMBED_PORT}:8081"]
    restart: unless-stopped
    ipc: host
    environment:
      HF_HOME: /root/.cache/huggingface
      TOKENIZERS_PARALLELISM: "false"
    volumes:
      - hf-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 60
      start_period: 180s

  # ── Vector store ────────────────────────────────────────────────────────────
  qdrant:
    image: ${QDRANT_IMAGE}
    container_name: qdrant
    ports: ["${QDRANT_PORT}:6333", "${QDRANT_GRPC_PORT}:6334"]
    restart: unless-stopped
    volumes:
      - qdrant_storage:/qdrant/storage

  # ── Document text extraction ────────────────────────────────────────────────
  tika:
    image: ${TIKA_IMAGE}
    container_name: tika
    ports: ["${TIKA_PORT}:9998"]
    restart: unless-stopped

  # ── Chat UI + RAG orchestrator ──────────────────────────────────────────────
  open-webui:
    image: ${OPENWEBUI_IMAGE}
    container_name: open-webui
    ports: ["${WEBUI_PORT}:8080"]
    restart: unless-stopped
    environment:
      # Chat backend
      OPENAI_API_BASE_URL: http://engine:8000/v1
      OPENAI_API_KEY: "sk-noauth"
      # Vector store
      VECTOR_DB: qdrant
      QDRANT_URI: http://qdrant:6333
      # Embeddings via the external vLLM embedding service
      RAG_EMBEDDING_ENGINE: openai
      RAG_OPENAI_API_BASE_URL: http://vllm-embedding:8081/v1
      RAG_OPENAI_API_KEY: "sk-noauth"
      RAG_EMBEDDING_MODEL: BAAI/bge-m3
      # Document extraction via Tika
      CONTENT_EXTRACTION_ENGINE: tika
      TIKA_SERVER_URL: http://tika:9998
      ENABLE_WEB_LOADER_SSL_VERIFICATION: "false"
    volumes:
      - open-webui-data:/app/backend/data
    depends_on:
      engine:
        condition: service_healthy
      vllm-embedding:
        condition: service_healthy
      qdrant:
        condition: service_started
      tika:
        condition: service_started

volumes:
  hf-cache:
    name: hf-cache
  qdrant_storage:
  open-webui-data:
